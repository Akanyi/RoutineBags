name: RoutineBagkkit
version: ${version}
main: dev.lans.routinebagkkit.RoutineBagkkitPlugin
api-version: '1.21'
author: LANS
description: Server-side RoutineBags companion plugin for Paper servers.
permissions:
  routinebagkkit.use:
    description: Allows using RoutineBagkkit server-side features.
    default: true
  routinebagkkit.sort:
    description: Allows server-side RoutineBags bundle sorting.
    default: true
  routinebagkkit.store:
    description: Allows server-side RoutineBags smart storing.
    default: true
